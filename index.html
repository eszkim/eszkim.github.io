<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ZamKim</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&display=swap');

    html, body {
      height: 100%;
      overflow: hidden;
    }
    body {
      font-family: 'Nanum Myeongjo', serif;
      background-color: #f0eee9;
      color: #2a2a28;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      height: 100dvh;
      margin: 0;
      -webkit-tap-highlight-color: transparent;
      opacity: 0;
      transition: opacity 0.35s ease;
      overscroll-behavior: none;
      position: fixed;
      width: 100%;
      top: 0;
      left: 0;
    }
    body.loaded { opacity: 1; }

    @media (prefers-color-scheme: dark) {
      body { background-color: #161514; color: #dcdad5; }
    }

    ul {
      list-style: none;
      padding: 0;
      text-align: center;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }
    li {
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: filter 0.3s ease, opacity 0.3s ease;
    }

    /* DROPDOWN BLUR — only when a dropdown is open */
    ul.menu-dropdown-open li:not(.has-open-submenu) {
      filter: blur(2px);
      opacity: 0.55;
    }
    li.has-open-submenu .submenu li {
      filter: none !important;
      opacity: 1 !important;
    }

    /* RGB GLITCH */
    @keyframes rgb-split-glitch {
      0%   { text-shadow: none; transform: translate(0, 0); }
      10%  { text-shadow: 6px 0 0px rgba(255,0,0,0.8), -6px 0 0px rgba(0,255,255,0.8); transform: translate(-5px, 1px); }
      20%  { text-shadow: -7px 0 0px rgba(255,0,0,0.8), 7px 0 0px rgba(0,255,255,0.8); transform: translate(5px, -1px); }
      30%  { text-shadow: 5px 0 0px rgba(255,0,0,0.7), -5px 0 0px rgba(0,255,255,0.7); transform: translate(-3px, 1px); }
      40%  { text-shadow: -6px 0 0px rgba(255,0,0,0.8), 6px 0 0px rgba(0,255,255,0.8); transform: translate(4px, 0); }
      50%  { text-shadow: 4px 0 0px rgba(255,0,0,0.6), -4px 0 0px rgba(0,255,255,0.6); transform: translate(-2px, -1px); }
      65%  { text-shadow: -3px 0 0px rgba(255,0,0,0.5), 3px 0 0px rgba(0,255,255,0.5); transform: translate(2px, 0); }
      80%  { text-shadow: 2px 0 0px rgba(255,0,0,0.3), -2px 0 0px rgba(0,255,255,0.3); transform: translate(-1px, 0); }
      100% { text-shadow: none; transform: translate(0, 0); }
    }

    .main-link {
      color: inherit;
      text-decoration: none;
      font-size: 1.3rem;
      letter-spacing: 0.15em;
      opacity: 0.6;
      transition: opacity 0.3s ease;
      cursor: pointer;
    }
    .glitch-link:hover {
      opacity: 1;
      animation: rgb-split-glitch 0.6s linear both;
    }
    .glitch-link.menu-active { opacity: 1; }
    .glitch-link.glitch-burst { opacity: 1; }

    /* SUBMENU DROPDOWN */
    .submenu-wrapper {
      height: 0;
      margin: 0;
      padding: 0;
      border: 0;
      overflow: hidden;
      transition: height 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .submenu {
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding-top: 15px;
      margin: 0;
      padding-left: 0;
    }

    /* SUBMENU LINKS — underline draws in on hover (0.6s), snaps out on leave (0.1s).
       The trick: default transition controls the leave, hover transition controls the enter. */
    .submenu a {
      font-size: 0.8rem;
      opacity: 0.7;
      text-decoration: none;
      color: inherit;
      cursor: pointer;
      display: inline-block;
      /* Underline implemented as a background gradient growing from 0 to 100% width */
      background-image: linear-gradient(currentColor, currentColor);
      background-size: 0% 1px;
      background-repeat: no-repeat;
      background-position: left bottom;
      /* Default transition = snap-out speed */
      transition: opacity 0.3s ease, background-size 0.1s ease;
    }
    .submenu a:hover {
      opacity: 1;
      background-size: 100% 1px;
      /* Hover transition = draw-in speed */
      transition: opacity 0.3s ease, background-size 0.6s ease;
    }

    /* SECTION LINK — the "words →" style link at the bottom of each dropdown */
    .submenu-section-link {
      opacity: 0.4 !important;
      font-size: 0.72rem !important;
      letter-spacing: 0.06em;
    }
    .submenu-section-link:hover {
      opacity: 0.75 !important;
    }

    /* Thin rule separating section link from the rest */
    .submenu-rule {
      display: block;
      width: 24px;
      height: 1px;
      background: rgba(150, 150, 150, 0.3);
      margin: 4px auto 0;
    }

    /* CLOSING PHRASE */
    .site-footer {
      position: fixed;
      bottom: 7vh;
      left: 0;
      right: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .site-footer-rule {
      width: 32px;
      height: 1px;
      background: rgba(150, 150, 150, 0.3);
    }

    .site-footer-phrase {
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      opacity: 0.35;
    }
  </style>
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Person",
  "name": "ZamKim",
  "description": "Artist based in Seoul. Musician, multi-instrumentalist, producer, songwriter, and poet.",
  "url": "https://zamkim.com",
  "sameAs": ["https://instagram.com/zamkim"]
}
</script>
</head>
<body>
  <ul>
    <li><a href="/about-me.html" class="main-link glitch-link">about me</a></li>

    <li>
      <a class="main-link glitch-link" onclick="toggleMenu(this, event)">words</a>
      <div class="submenu-wrapper">
        <ul class="submenu">
          <li><a href="/curated.html">curated</a></li>
          <li><a href="/the-loop.html">the loop</a></li>
          <li><span class="submenu-rule"></span></li>
          <li><a href="/words.html" class="submenu-section-link">words &rarr;</a></li>
        </ul>
      </div>
    </li>

    <li>
      <a class="main-link glitch-link" onclick="toggleMenu(this, event)">sounds</a>
      <div class="submenu-wrapper">
        <ul class="submenu">
          <li><a href="/releases.html">releases</a></li>
          <li><span class="submenu-rule"></span></li>
          <li><a href="/sounds.html" class="submenu-section-link">sounds &rarr;</a></li>
        </ul>
      </div>
    </li>

    <li>
      <a class="main-link glitch-link" onclick="toggleMenu(this, event)">colors</a>
      <div class="submenu-wrapper">
        <ul class="submenu">
          <li><a href="/studies.html">studies</a></li>
          <li><a href="/glimpses.html">glimpses</a></li>
          <li><span class="submenu-rule"></span></li>
          <li><a href="/colors.html" class="submenu-section-link">colors &rarr;</a></li>
        </ul>
      </div>
    </li>
  </ul>

  <div class="site-footer">
    <div class="site-footer-rule"></div>
    <span class="site-footer-phrase">i hope you find something that stays with you.</span>
  </div>

  <script>
    const topLevelMenu = document.querySelector('body > ul');
    const topLevelItems = topLevelMenu.querySelectorAll(':scope > li');

    function closeAllMenus() {
      document.querySelectorAll('.submenu-wrapper').forEach(menu => {
        menu.style.height = '0px';
        menu.classList.remove('open');
      });
      topLevelItems.forEach(item => item.classList.remove('has-open-submenu'));
      topLevelMenu.classList.remove('menu-dropdown-open');
      stopGlitchLoop();
    }

    function toggleMenu(element, event) {
      if (event) event.stopPropagation();
      const wrapper = element.nextElementSibling;
      const parentItem = element.closest('li');
      const isOpen = wrapper.classList.contains('open');

      closeAllMenus();

      if (!isOpen) {
        const submenu = wrapper.querySelector('.submenu');
        const fullHeight = submenu.scrollHeight;
        wrapper.style.height = fullHeight + 'px';
        wrapper.classList.add('open');
        parentItem.classList.add('has-open-submenu');
        topLevelMenu.classList.add('menu-dropdown-open');
        startGlitchLoop(element);
      }
    }

    // Click outside closes dropdown
    document.addEventListener('click', (e) => {
      const openWrapper = document.querySelector('.submenu-wrapper.open');
      if (!openWrapper) return;
      const openParentItem = openWrapper.closest('li');
      if (!openParentItem.contains(e.target)) {
        closeAllMenus();
      }
    });

    // INFINITE GLITCH LOOP
    let glitchTimeoutId = null;
    let glitchActiveLink = null;

    function randomDuration() {
      return 0.1 + Math.random() * 0.6;
    }

    function runGlitchBurst(link) {
      const burstSeconds = randomDuration();
      link.style.animation = 'none';
      void link.offsetWidth;
      link.style.animation = `rgb-split-glitch ${burstSeconds}s linear`;
      link.classList.add('glitch-burst');

      glitchTimeoutId = setTimeout(() => {
        link.style.animation = 'none';
        link.classList.remove('glitch-burst');
        const pauseSeconds = randomDuration();
        glitchTimeoutId = setTimeout(() => runGlitchBurst(link), pauseSeconds * 1000);
      }, burstSeconds * 1000);
    }

    function startGlitchLoop(link) {
      glitchActiveLink = link;
      link.classList.add('menu-active');
      runGlitchBurst(link);
    }

    function stopGlitchLoop() {
      if (glitchTimeoutId) {
        clearTimeout(glitchTimeoutId);
        glitchTimeoutId = null;
      }
      if (glitchActiveLink) {
        glitchActiveLink.style.animation = '';
        glitchActiveLink.classList.remove('glitch-burst');
        glitchActiveLink.classList.remove('menu-active');
        glitchActiveLink = null;
      }
    }

    // PAGE FADE TRANSITION
    window.addEventListener('DOMContentLoaded', () => {
      document.body.classList.add('loaded');
    });

    window.addEventListener('pageshow', (e) => {
      if (e.persisted) {
        document.body.classList.add('loaded');
      }
    });

    document.querySelectorAll('a[href]').forEach(link => {
      const href = link.getAttribute('href');
      const isExternal = link.target === '_blank' || href.startsWith('http');
      const isAnchorOnly = href.startsWith('#');
      const isJsHandled = link.hasAttribute('onclick');
      if (isExternal || isAnchorOnly || isJsHandled) return;
      link.addEventListener('click', (e) => {
        e.preventDefault();
        document.body.classList.remove('loaded');
        setTimeout(() => { window.location.href = href; }, 350);
      });
    });
  </script>
</body>
</html>
