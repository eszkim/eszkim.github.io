<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZamKim</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&display=swap');

    body {
      font-family: 'Nanum Myeongjo', serif;
      background-color: #f0eee9; 
      color: #2a2a28; 
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      padding: 20px;
    }
    
    @media (prefers-color-scheme: dark) {
      body { background-color: #161514; color: #dcdad5; }
    }

    ul { 
      list-style: none; 
      padding: 0; 
      text-align: center; 
      margin: 0; 
      display: flex; 
      flex-direction: column; 
      gap: 32px; /* Increased gap to make the spacing visually clear */
    }

    /* Reset all list items so they don't have their own margins */
    li { margin: 0; padding: 0; }

    @keyframes rgb-split-glitch {
      0%   { text-shadow: none; transform: translate(0, 0); }
      20%  { text-shadow: 5px 0 0px rgba(255,0,0,0.7), -5px 0 0px rgba(0,255,255,0.7); transform: translate(-4px, 0); }
      40%  { text-shadow: -5px 0 0px rgba(255,0,0,0.7), 5px 0 0px rgba(0,255,255,0.7); transform: translate(4px, 0); }
      60%  { text-shadow: 4px 0 0px rgba(0,255,0,0.7), -4px 0 0px rgba(0,0,255,0.7); transform: translate(-2px, 0); }
      100% { text-shadow: none; transform: translate(0, 0); }
    }

    .main-link {
      color: inherit;
      text-decoration: none;
      font-size: 1.3rem;
      letter-spacing: 0.15em;
      opacity: 0.6;
      transition: opacity 0.3s ease; 
      cursor: pointer;
      display: inline-block;
    }

    .main-link:hover {
      opacity: 1;
      animation: rgb-split-glitch 0.25s linear both;
    }

    /* --- DROPDOWN LOGIC --- */
    .submenu-wrapper {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      overflow: hidden;
    }

    .submenu-wrapper.open { grid-template-rows: 1fr; }

    .submenu {
      min-height: 0; 
      display: flex;
      flex-direction: column;
      gap: 12px; 
      padding-top: 15px;
      margin: 0;
      /* Ensure submenu doesn't add extra space to the list gap */
      gap: 12px; 
    }

    .submenu a {
      font-size: 0.8rem;
      opacity: 0.4;
      text-decoration: none;
      color: inherit;
      cursor: pointer;
    }

    .submenu a:hover { opacity: 1; }
  </style>
</head>
<body>

  <ul id="main-menu">
    <li><a href="/about.html" class="main-link">about me</a></li>
    
    <li class="dropdown">
      <a class="main-link" onclick="toggleMenu(this)">texts</a>
      <div class="submenu-wrapper">
        <ul class="submenu">
          <li><a href="/curated.html">curated</a></li>
          <li><a href="/the-loop.html">the loop</a></li>
        </ul>
      </div>
    </li>

    <li class="dropdown">
      <a class="main-link" onclick="toggleMenu(this)">audio</a>
      <div class="submenu-wrapper">
        <ul class="submenu">
          <li><a href="/releases.html">releases</a></li>
          <li><a href="/sketches.html">sketches</a></li>
        </ul>
      </div>
    </li>

    <li class="dropdown">
      <a class="main-link" onclick="toggleMenu(this)">visuals</a>
      <div class="submenu-wrapper">
        <ul class="submenu">
          <li><a href="/studies.html">studies</a></li>
          <li><a href="/glimpses.html">glimpses</a></li>
        </ul>
      </div>
    </li>
    
    <li><a href="https://instagram.com/zamkim" target="_blank" rel="noopener noreferrer" class="main-link">@zamkim</a></li>
  </ul>

  <script>
    function toggleMenu(element) {
      const wrapper = element.nextElementSibling;
      const isOpen = wrapper.classList.contains('open');
      
      // Close all other submenus
      document.querySelectorAll('.submenu-wrapper').forEach(menu => {
        menu.classList.remove('open');
      });
      
      // Toggle the clicked one only if it wasn't already open
      if (!isOpen) {
        wrapper.classList.add('open');
      }
    }
  </script>
</body>
</html>
