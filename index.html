<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZamKim</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&display=swap');

    body {
      font-family: 'Nanum Myeongjo', serif;
      background-color: #f0eee9; 
      color: #2a2a28; 
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      padding: 20px;
    }
    
    @media (prefers-color-scheme: dark) {
      body {
        background-color: #161514; 
        color: #dcdad5; 
      }
    }

    ul {
      list-style: none;
      padding: 0;
      text-align: center;
      margin: 0;
    }

    .menu-item {
      margin: 24px 0;
    }

    /* The RGB Glitch */
    @keyframes rgb-split-glitch {
      0%   { text-shadow: none; transform: translate(0, 0); }
      15%  { text-shadow: 3px 0 0px rgba(255,0,0,0.8), -3px 0 0px rgba(0,255,255,0.8); transform: translate(-2px, 0); }
      30%  { text-shadow: -4px 0 0px rgba(255,0,0,0.8), 4px 0 0px rgba(0,255,255,0.8); transform: translate(2px, 0); }
      45%  { text-shadow: 2px 0 0px rgba(255,0,0,0.8), -2px 0 0px rgba(0,255,255,0.8); transform: translate(-1px, 0); }
      60%  { text-shadow: -3px 0 0px rgba(0,255,0,0.8), 3px 0 0px rgba(0,0,255,0.8); transform: translate(1px, 0); }
      75%  { text-shadow: 1px 0 0px rgba(255,0,255,0.8), -1px 0 0px rgba(255,255,0,0.8); transform: translate(-1px, 0); }
      100% { text-shadow: none; transform: translate(0, 0); }
    }

    a {
      color: inherit;
      text-decoration: none;
      font-size: 0.95rem;
      letter-spacing: 0.15em;
      opacity: 0.5;
      transition: opacity 0.4s ease; 
      display: inline-block; 
      cursor: pointer;
    }

    a:hover {
      opacity: 1;
      animation: rgb-split-glitch 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
    }

    /* --- DROPDOWN LOGIC --- */
    .submenu-wrapper {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 0.5s cubic-bezier(0.25, 1, 0.5, 1);
      overflow: hidden;
    }

    .dropdown:hover .submenu-wrapper {
      grid-template-rows: 1fr;
    }

    .submenu {
      min-height: 0; 
      display: flex;
      flex-direction: column;
      gap: 16px; 
      padding-top: 0;
      transition: padding-top 0.5s ease;
    }

    .dropdown:hover .submenu {
      padding-top: 20px; 
      padding-bottom: 8px;
    }

    .submenu a {
      font-size: 0.8rem;
      opacity: 0.35;
    }
    
    .submenu a:hover {
      opacity: 1;
    }
  </style>
</head>
<body>

  <ul>
    <li class="menu-item"><a href="/about.html">about me</a></li>
    
    <!-- TEXTS -->
    <li class="menu-item dropdown">

        <ul class="submenu">
          <li><a href="/curated.html">curated</a></li>

        </ul>
      </div>
    </li>

    <!-- AUDIO -->
    <li class="menu-item dropdown">
      <a>audio</a>
      <div class="submenu-wrapper">
        <ul class="submenu">
          <li><a href="/releases.html">releases</a></li>
          <li><a href="/sketches.html">sketches</a></li>
        </ul>
      </div>
    </li>

    <!-- VISUALS -->
    <li class="menu-item dropdown">
      <a>visuals</a>
      <div class="submenu-wrapper">
        <ul class="submenu">
          <li><a href="/studies.html">studies</a></li>
          <li><a href="/glimpses.html">glimpses</a></li>
        </ul>
      </div>
    </li>
    
    <li class="menu-item"><a href="https://instagram.com/zamkim" target="_blank" rel="noopener noreferrer">@zamkim</a></li>
  </ul>

</body>
</html>
