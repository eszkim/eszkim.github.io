<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZamKim</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&display=swap');

    body {
      font-family: 'Nanum Myeongjo', serif;
      background-color: #f0eee9; 
      color: #2a2a28; 
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      padding: 20px;
    }
    
    @media (prefers-color-scheme: dark) {
      body {
        background-color: #161514; 
        color: #dcdad5; 
      }
    }

    ul { list-style: none; padding: 0; text-align: center; margin: 0; }
    .menu-item { margin: 32px 0; }

    @keyframes rgb-split-glitch {
      0%   { text-shadow: none; transform: translate(0, 0); }
      15%  { text-shadow: 3px 0 0px rgba(255,0,0,0.8), -3px 0 0px rgba(0,255,255,0.8); transform: translate(-2px, 0); }
      100% { text-shadow: none; transform: translate(0, 0); }
    }

    /* Main Menu Links */
    .main-link {
      color: inherit;
      text-decoration: none;
      font-size: 1.3rem; /* Larger */
      letter-spacing: 0.15em;
      opacity: 0.6;
      transition: opacity 0.3s ease; 
      cursor: pointer;
      display: inline-block;
    }

    .main-link:hover {
      opacity: 1;
      animation: rgb-split-glitch 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
    }

    /* --- CLICKABLE DROPDOWN LOGIC --- */
    .submenu-wrapper {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 0.4s ease;
      overflow: hidden;
    }

    .submenu-wrapper.open {
      grid-template-rows: 1fr;
    }

    .submenu {
      min-height: 0; 
      display: flex;
      flex-direction: column;
      gap: 12px; 
      padding-top: 15px;
    }

    .submenu a {
      font-size: 0.8rem;
      opacity: 0.4;
      text-decoration: none;
      color: inherit;
      cursor: pointer;
    }

    .submenu a:hover { opacity: 1; }
  </style>
</head>
<body>

  <ul>
    <li class="menu-item"><a href="/about.html" class="main-link">about me</a></li>
    
    <li class="menu-item dropdown">
      <a class="main-link" onclick="toggleMenu(this)">texts</a>
      <div class="submenu-wrapper">
        <ul class="submenu">
          <li><a href="/curated.html">curated</a></li>
          <li><a href="/the-loop.html">the loop</a></li>
        </ul>
      </div>
    </li>

    <li class="menu-item dropdown">
      <a class="main-link" onclick="toggleMenu(this)">audio</a>
      <div class="submenu-wrapper">
        <ul class="submenu">
          <li><a href="/releases.html">releases</a></li>
          <li><a href="/sketches.html">sketches</a></li>
        </ul>
      </div>
    </li>

    <li class="menu-item dropdown">
      <a class="main-link" onclick="toggleMenu(this)">visuals</a>
      <div class="submenu-wrapper">
        <ul class="submenu">
          <li><a href="/studies.html">studies</a></li>
          <li><a href="/glimpses.html">glimpses</a></li>
        </ul>
      </div>
    </li>
    
    <li class="menu-item"><a href="https://instagram.com/zamkim" target="_blank" rel="noopener noreferrer" class="main-link">@zamkim</a></li>
  </ul>

  <script>
    function toggleMenu(element) {
      const wrapper = element.nextElementSibling;
      wrapper.classList.toggle('open');
    }
  </script>

</body>
</html>
