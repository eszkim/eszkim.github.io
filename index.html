<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZamKim</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&display=swap');
    body {
      font-family: 'Nanum Myeongjo', serif;
      background-color: #f0eee9; 
      color: #2a2a28; 
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    
    @media (prefers-color-scheme: dark) {
      body { background-color: #161514; color: #dcdad5; }
    }
    /* Standardized flex container for the entire list */
    ul { 
      list-style: none; 
      padding: 0; 
      text-align: center; 
      margin: 0; 
      display: flex; 
      flex-direction: column; 
      gap: 32px; 
    }
    /* Force every list item to a fixed block */
    li { 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
    }
    /* RGB Glitch (Updated selector to match structure) */
    @keyframes rgb-split-glitch {
      0%   { text-shadow: none; transform: translate(0, 0); }
      20%  { text-shadow: 5px 0 0px rgba(255,0,0,0.7), -5px 0 0px rgba(0,255,255,0.7); transform: translate(-4px, 0); }
      100% { text-shadow: none; transform: translate(0, 0); }
    }
    .main-link {
      color: inherit;
      text-decoration: none;
      font-size: 1.3rem;
      letter-spacing: 0.15em;
      opacity: 0.6;
      transition: opacity 0.3s ease; 
      cursor: pointer;
    }
    .main-link:hover {
      opacity: 1;
      animation: rgb-split-glitch 0.25s linear both;
    }
    /* FIXED: height is now set in pixels by JavaScript to match each
       submenu's real content height, so opening and closing both animate
       across the exact same distance — smooth and symmetric both ways. */
    .submenu-wrapper {
      height: 0;
      margin: 0;
      padding: 0;
      border: 0;
      overflow: hidden;
      transition: height 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .submenu {
      min-height: 0; 
      display: flex;
      flex-direction: column;
      gap: 12px; 
      padding-top: 15px;
      margin: 0;
      padding-left: 0;
    }
    .submenu a {
      font-size: 0.8rem;
      opacity: 0.4;
      text-decoration: none;
      color: inherit;
      cursor: pointer;
    }
    .submenu a:hover { opacity: 1; }
  </style>
</head>
<body>
  <ul>
    <li><a href="/about.html" class="main-link">about me</a></li>
    
    <li>
      <a class="main-link" onclick="toggleMenu(this)">texts</a>
      <div class="submenu-wrapper">
        <ul class="submenu">
          <li><a href="/curated.html">curated</a></li>
          <li><a href="/the-loop.html">the loop</a></li>
        </ul>
      </div>
    </li>
    <li>
      <a class="main-link" onclick="toggleMenu(this)">audio</a>
      <div class="submenu-wrapper">
        <ul class="submenu">
          <li><a href="/releases.html">releases</a></li>
          <li><a href="/sketches.html">sketches</a></li>
        </ul>
      </div>
    </li>
    <li>
      <a class="main-link" onclick="toggleMenu(this)">visuals</a>
      <div class="submenu-wrapper">
        <ul class="submenu">
          <li><a href="/studies.html">studies</a></li>
          <li><a href="/glimpses.html">glimpses</a></li>
        </ul>
      </div>
    </li>
    
    <li><a href="https://instagram.com/zamkim" target="_blank" rel="noopener noreferrer" class="main-link">@zamkim</a></li>
  </ul>
  <script>
    function toggleMenu(element) {
      const wrapper = element.nextElementSibling;
      const isOpen = wrapper.classList.contains('open');

      // Close every dropdown first (animates them back to 0)
      document.querySelectorAll('.submenu-wrapper').forEach(menu => {
        menu.style.height = '0px';
        menu.classList.remove('open');
      });

      // If the clicked one wasn't already open, open it by measuring
      // its real content height and animating to that exact value
      if (!isOpen) {
        const submenu = wrapper.querySelector('.submenu');
        const fullHeight = submenu.scrollHeight;
        wrapper.style.height = fullHeight + 'px';
        wrapper.classList.add('open');
      }
    }
  </script>
</body>
</html>
