<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZamKim</title>
  <style>
    /* Imports the Nanum Myeongjo font */
    @import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&display=swap');

    body {
      font-family: 'Nanum Myeongjo', serif;
      background-color: #f0eee9; 
      color: #2a2a28; 
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      padding: 20px;
    }
    
    @media (prefers-color-scheme: dark) {
      body {
        background-color: #161514; 
        color: #dcdad5; 
      }
    }

    ul {
      list-style: none;
      padding: 0;
      text-align: center;
    }

    li {
      margin: 24px 0;
    }

    /* THE RGB SPLIT / CHROMATIC ABERRATION GLITCH */
    @keyframes rgb-split-glitch {
      0%   { text-shadow: none; transform: translate(0, 0); }
      15%  { text-shadow: 3px 0 0px rgba(255,0,0,0.8), -3px 0 0px rgba(0,255,255,0.8); transform: translate(-2px, 0); }
      30%  { text-shadow: -4px 0 0px rgba(255,0,0,0.8), 4px 0 0px rgba(0,255,255,0.8); transform: translate(2px, 0); }
      45%  { text-shadow: 2px 0 0px rgba(255,0,0,0.8), -2px 0 0px rgba(0,255,255,0.8); transform: translate(-1px, 0); }
      60%  { text-shadow: -3px 0 0px rgba(0,255,0,0.8), 3px 0 0px rgba(0,0,255,0.8); transform: translate(1px, 0); }
      75%  { text-shadow: 1px 0 0px rgba(255,0,255,0.8), -1px 0 0px rgba(255,255,0,0.8); transform: translate(-1px, 0); }
      100% { text-shadow: none; transform: translate(0, 0); }
    }

    a {
      color: inherit;
      text-decoration: none;
      font-size: 0.95rem;
      letter-spacing: 0.15em;
      opacity: 0.5;
      /* We keep the smooth fade-in for the opacity */
      transition: opacity 0.4s ease; 
      display: inline-block; 
    }

    a:hover {
      opacity: 1;
      /* This fires the RGB split animation for exactly 0.3 seconds */
      animation: rgb-split-glitch 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
    }
  </style>
</head>
<body>

  <ul>
    <li><a href="/about.html">about me</a></li>
    <li><a href="/archive.html">archive</a></li>
    <li><a href="https://instagram.com/zamkim" target="_blank" rel="noopener noreferrer">@zamkim</a></li>
  </ul>

</body>
</html>
