<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZamKim</title>
  <style>
    /* This centers the menu dead in the middle of the screen */
    body {
      font-family: monospace;
      background-color: #fcfcfc;
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    
    /* Dark mode support */
    @media (prefers-color-scheme: dark) {
      body {
        background-color: #121212;
        color: #e0e0e0;
      }
    }

    /* Removes bullet points and centers the text */
    ul {
      list-style: none;
      padding: 0;
      text-align: center;
    }

    /* Spacing between the doors (links) */
    li {
      margin: 24px 0;
    }

    /* The styling for the links: ghosted until you hover over them */
    a {
      color: inherit;
      text-decoration: none;
      font-size: 0.95rem;
      letter-spacing: 0.15em;
      opacity: 0.4;
      transition: opacity 0.3s ease;
    }

    /* When the mouse hovers, the text lights up */
    a:hover {
      opacity: 1;
    }
  </style>
</head>
<body>

  <ul>
    <li><a href="/about.html">about</a></li>
    <li><a href="/archive.html">archive</a></li>
    <li><a href="https://instagram.com/zamkim" target="_blank" rel="noopener noreferrer">@zamkim</a></li>
  </ul>

</body>
</html>
