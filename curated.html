<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZamKim</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&family=Spectral:wght@400;600&display=swap');
    body {
      font-family: 'Spectral', serif;
      background-color: #f0eee9;
      color: #2a2a28;
      display: flex;
      justify-content: center;
      padding: 8vh 20px;
      margin: 0;
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
    }
    
    @media (prefers-color-scheme: dark) {
      body { background-color: #161514; color: #dcdad5; }
    }
    .nav-font { font-family: 'Nanum Myeongjo', serif; }
    @keyframes rgb-split-glitch {
      0%   { text-shadow: none; transform: translate(0, 0); }
      20%  { text-shadow: 5px 0 0px rgba(255,0,0,0.7), -5px 0 0px rgba(0,255,255,0.7); transform: translate(-4px, 0); }
      100% { text-shadow: none; transform: translate(0, 0); }
    }
    .glitch-link:hover { opacity: 1; animation: rgb-split-glitch 0.25s linear both; }
    .back-btn {
      color: inherit; text-decoration: none; font-size: 0.95rem; opacity: 0.5;
      transition: opacity 0.3s ease;
      display: inline-block; margin-bottom: 24px; letter-spacing: 0.1em; cursor: pointer;
    }
    .container { width: 100%; max-width: 720px; }
    .page-title {
      font-family: 'Nanum Myeongjo', serif;
      font-size: 2rem;
      font-weight: bold;
      letter-spacing: -0.02em;
      margin-bottom: 32px;
      border-bottom: 1px solid rgba(150, 150, 150, 0.2);
      padding-bottom: 24px;
    }
    .placeholder-note {
      opacity: 0.6;
      font-style: italic;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-btn nav-font glitch-link">[ &larr; menu ]</a>
    <div class="page-title">[page title here]</div>
    <p class="placeholder-note">Under construction.</p>
  </div>
</body>
</html>
