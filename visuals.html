<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visuals | ZamKim</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&family=Spectral:wght@400;600&display=swap');
    body {
      font-family: 'Spectral', serif;
      background-color: #f0eee9;
      color: #2a2a28;
      display: flex;
      justify-content: center;
      padding: 8vh 20px;
      margin: 0;
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
    }

    @media (prefers-color-scheme: dark) {
      body { background-color: #161514; color: #dcdad5; }
    }

    .nav-font { font-family: 'Nanum Myeongjo', serif; }

    @keyframes rgb-split-glitch {
      0%   { text-shadow: none; transform: translate(0, 0); }
      20%  { text-shadow: 5px 0 0px rgba(255,0,0,0.7), -5px 0 0px rgba(0,255,255,0.7); transform: translate(-4px, 0); }
      100% { text-shadow: none; transform: translate(0, 0); }
    }
    .glitch-link:hover { opacity: 1; animation: rgb-split-glitch 0.25s linear both; }

    .back-btn {
      color: inherit; text-decoration: none; font-size: 0.95rem; opacity: 0.5;
      transition: opacity 0.3s ease;
      display: inline-block; margin-bottom: 24px; letter-spacing: 0.1em; cursor: pointer;
    }

    /* Wider than the text-focused pages (720px) since masonry columns
       need more horizontal room to breathe at the same negative-space feel */
    .container { width: 100%; max-width: 980px; }

    .page-title {
      font-family: 'Nanum Myeongjo', serif;
      font-size: 2rem;
      font-weight: bold;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
      border-bottom: 1px solid rgba(150, 150, 150, 0.2);
      padding-bottom: 24px;
    }

    .page-subtitle {
      font-size: 0.95rem;
      line-height: 1.7;
      opacity: 0.75;
      margin: 20px 0 48px;
    }

    /* MASONRY GRID
       Generous gaps (32px) carry the negative-space feel.
       2 columns on mobile, 3 on wider screens. */
    .gallery {
      column-count: 2;
      column-gap: 32px;
    }
    @media (min-width: 700px) {
      .gallery { column-count: 3; }
    }

    .gallery-item {
      margin-bottom: 32px;
      break-inside: avoid;
      cursor: pointer;
    }

    .gallery-item img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 2px;
      transition: opacity 0.25s ease;
    }
    .gallery-item:hover img { opacity: 0.85; }

    /* LIGHTBOX */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.88);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 32px;
      z-index: 100;
      cursor: zoom-out;
    }
    .lightbox.open { display: flex; }

    .lightbox img {
      max-width: 100%;
      max-height: 100%;
      border-radius: 2px;
      cursor: default;
    }

    .lightbox-close {
      position: fixed;
      top: 28px;
      right: 32px;
      color: #ece9e3;
      font-family: 'Nanum Myeongjo', serif;
      font-size: 0.9rem;
      letter-spacing: 0.1em;
      opacity: 0.6;
      cursor: pointer;
      transition: opacity 0.3s ease;
    }
    .lightbox-close:hover { opacity: 1; }
  </style>
</head>
<body>

  <div class="container">

    <a href="/" class="back-btn nav-font glitch-link">[ &larr; menu ]</a>

    <div class="page-title">visuals</div>
    <div class="page-subtitle">
      A loose collection of photographs &mdash; no particular order, no particular theme. Click any image to view it larger.
    </div>

    <div class="gallery" id="gallery"></div>

  </div>

  <div class="lightbox" id="lightbox">
    <div class="lightbox-close">[ close ]</div>
    <img id="lightbox-img" src="" alt="">
  </div>

  <script>
    /* PHOTOS
       To add a new photo: drop the file into /images/ in your repo,
       then add one line here with its filename and a short alt description.
       Newest can go at the top or bottom — order here is the order shown. */
    const photos = [
      { src: "/images/sample-1.jpg", alt: "Sample placeholder photo 1" },
      { src: "/images/sample-2.jpg", alt: "Sample placeholder photo 2" },
      { src: "/images/sample-3.jpg", alt: "Sample placeholder photo 3" },
      { src: "/images/sample-4.jpg", alt: "Sample placeholder photo 4" },
      { src: "/images/sample-5.jpg", alt: "Sample placeholder photo 5" },
      { src: "/images/sample-6.jpg", alt: "Sample placeholder photo 6" }
    ];

    const gallery = document.getElementById('gallery');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');

    photos.forEach(photo => {
      const item = document.createElement('div');
      item.className = 'gallery-item';

      const img = document.createElement('img');
      img.src = photo.src;
      img.alt = photo.alt;
      img.loading = 'lazy';

      item.appendChild(img);
      item.onclick = () => openLightbox(photo.src, photo.alt);

      gallery.appendChild(item);
    });

    function openLightbox(src, alt) {
      lightboxImg.src = src;
      lightboxImg.alt = alt;
      lightbox.classList.add('open');
    }

    lightbox.addEventListener('click', () => {
      lightbox.classList.remove('open');
      lightboxImg.src = '';
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        lightbox.classList.remove('open');
        lightboxImg.src = '';
      }
    });
  </script>

</body>
</html>
