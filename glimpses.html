<!DOCTYPE html> 
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glimpses | ZamKim</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&family=Spectral:wght@400;600&display=swap');
    body {
      font-family: 'Spectral', serif;
      background-color: #f0eee9;
      color: #2a2a28;
      display: flex;
      justify-content: center;
      padding: 8vh 20px;
      margin: 0;
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
      opacity: 0;
      transition: opacity 0.35s ease;
    }
    body.loaded {
      opacity: 1;
    }

    @media (prefers-color-scheme: dark) {
      body { background-color: #161514; color: #dcdad5; }
    }

    .nav-font { font-family: 'Nanum Myeongjo', serif; }

    @keyframes rgb-split-glitch {
      0%   { text-shadow: none; transform: translate(0, 0); }
      10%  { text-shadow: 6px 0 0px rgba(255,0,0,0.8), -6px 0 0px rgba(0,255,255,0.8); transform: translate(-5px, 1px); }
      20%  { text-shadow: -7px 0 0px rgba(255,0,0,0.8), 7px 0 0px rgba(0,255,255,0.8); transform: translate(5px, -1px); }
      30%  { text-shadow: 5px 0 0px rgba(255,0,0,0.7), -5px 0 0px rgba(0,255,255,0.7); transform: translate(-3px, 1px); }
      40%  { text-shadow: -6px 0 0px rgba(255,0,0,0.8), 6px 0 0px rgba(0,255,255,0.8); transform: translate(4px, 0); }
      50%  { text-shadow: 4px 0 0px rgba(255,0,0,0.6), -4px 0 0px rgba(0,255,255,0.6); transform: translate(-2px, -1px); }
      65%  { text-shadow: -3px 0 0px rgba(255,0,0,0.5), 3px 0 0px rgba(0,255,255,0.5); transform: translate(2px, 0); }
      80%  { text-shadow: 2px 0 0px rgba(255,0,0,0.3), -2px 0 0px rgba(0,255,255,0.3); transform: translate(-1px, 0); }
      100% { text-shadow: none; transform: translate(0, 0); }
    }
    .glitch-link:hover { opacity: 1; animation: rgb-split-glitch 0.6s linear both; }

    .back-btn {
      color: inherit; text-decoration: none; font-size: 0.95rem; opacity: 0.5;
      transition: opacity 0.3s ease;
      display: inline-block; margin-bottom: 24px; letter-spacing: 0.1em; cursor: pointer;
    }

    /* Wider than the text-focused pages (720px) since masonry columns
       need more horizontal room to breathe at the same negative-space feel */
    .container { width: 100%; max-width: 980px; }

    .page-title {
      font-family: 'Nanum Myeongjo', serif;
      font-size: 2rem;
      font-weight: bold;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
      border-bottom: 1px solid rgba(150, 150, 150, 0.2);
      padding-bottom: 24px;
    }

    .page-subtitle {
      font-size: 0.95rem;
      line-height: 1.7;
      opacity: 0.75;
      margin: 20px 0 48px;
    }

    /* MASONRY GRID
       Generous gaps (32px) carry the negative-space feel.
       2 columns on mobile, 3 on wider screens. */
    .gallery {
      column-count: 2;
      column-gap: 32px;
    }
    @media (min-width: 700px) {
      .gallery { column-count: 3; }
    }

    .gallery-item {
      margin-bottom: 32px;
      break-inside: avoid;
      cursor: pointer;
    }

    .gallery-item img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 2px;
      transition: opacity 0.25s ease;
    }
    .gallery-item:hover img { opacity: 0.85; }

    /* LIGHTBOX */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.88);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
      z-index: 100;
      cursor: zoom-out;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease;
    }
    .lightbox.open {
      opacity: 1;
      visibility: visible;
    }

    .lightbox img {
      max-width: 100%;
      max-height: 80vh;
      border-radius: 2px;
      cursor: default;
    }

    .lightbox-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 100%;
      max-height: 100%;
      cursor: default;
    }

    .lightbox-caption {
      font-family: 'Spectral', serif;
      font-size: 0.9rem;
      color: #ece9e3;
      opacity: 0.75;
      margin-top: 16px;
      text-align: center;
      max-width: 600px;
    }

    .lightbox-nav {
      position: fixed;
      top: 0;
      bottom: 0;
      width: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #ece9e3;
      font-family: 'Nanum Myeongjo', serif;
      font-size: 1.6rem;
      opacity: 0.4;
      transition: opacity 0.3s ease;
      z-index: 101;
    }
    .lightbox-prev { left: 0; }
    .lightbox-next { right: 0; }

    /* On devices with real hover (mouse/trackpad), arrows stay hidden
       until the lightbox is being moused over, then fade in. On touch
       devices (no hover capability), keep them visible at low opacity
       always, since there's no "approach" gesture to reveal them with. */
    @media (hover: hover) {
      .lightbox-nav { opacity: 0; }
      .lightbox:hover .lightbox-nav { opacity: 0.4; }
      .lightbox-nav:hover { opacity: 1; }
    }

    .lightbox-close {
      position: fixed;
      top: 28px;
      right: 32px;
      color: #ece9e3;
      font-family: 'Nanum Myeongjo', serif;
      font-size: 0.9rem;
      letter-spacing: 0.1em;
      opacity: 0.6;
      cursor: pointer;
      transition: opacity 0.3s ease;
      z-index: 101;
    }
    .lightbox-close:hover { opacity: 1; }
  </style>
</head>
<body>

  <div class="container">

    <a href="/" class="back-btn nav-font glitch-link">[ &larr; menu ]</a>

    <div class="page-title">glimpses</div>
    <div class="page-subtitle">
      Quick, unplanned snapshots &mdash; phone in hand, no setup. Click any image to view it larger.
    </div>

    <div class="gallery" id="gallery"></div>

  </div>

  <div class="lightbox" id="lightbox">
    <div class="lightbox-close">[ close ]</div>
    <div class="lightbox-nav lightbox-prev" id="lightbox-prev">&larr;</div>
    <div class="lightbox-nav lightbox-next" id="lightbox-next">&rarr;</div>
    <div class="lightbox-content" id="lightbox-content">
      <img id="lightbox-img" src="" alt="">
      <div class="lightbox-caption" id="lightbox-caption"></div>
    </div>
  </div>

  <script>
    /* PHOTOS
       To add a new photo: drop the file into /images/ in your repo,
       then add one line here with its filename, a short alt description,
       and a one-line caption shown in the lightbox.
       Newest can go at the top or bottom — order here is the order shown. */
    const photos = [
      { src: "/glimpses/summer-mirror.jpg", alt: "Traffic guiding mirror standing in the summer heat, attached to a power pole with cables behind, near Hongdae, Seoul", caption: "26th June, 2026" },
      { src: "/glimpses/daisies.jpg", alt: "Bunch of common daisies in UK", caption: "19th May, 2026" },
      { src: "/glimpses/suspect-triangle.jpg", alt: "Plushies of Squid Game guard characters at a bar in Hongdae, Seoul", caption: "7th March, 2026" },
      { src: "/glimpses/under-the-sun.png", alt: "Woman taking in the California sun, sitting on a grass hill at The Getty", caption: "25th Jan, 2026" },
      { src: "/glimpses/california-sunset.jpg", alt: "Sunset with palm trees silhouette, taken during NAMM in Anaheim, California", caption: "22nd Jan, 2026" },
      { src: "/glimpses/lightbulbs.png", alt: "Beautiful lightbulbs hanging in the terrace of a cafe in Hongdae, Seoul", caption: "19th Oct, 2025" },
      { src: "/glimpses/buddha-stands.jpg", alt: "A statue of Buddha in Yangyang", caption: "9th May, 2025" },
      { src: "/glimpses/blue-skies-winding-roads.png", alt: "Overpasses winding over each other in Seoul", caption: "9th Feb, 2025" },
      { src: "/glimpses/buyeong.png", alt: "Neon lights over a building at night somewhere in Seoul", caption: "26th August, 2023" }
    ];

    const gallery = document.getElementById('gallery');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    const lightboxCaption = document.getElementById('lightbox-caption');
    const prevBtn = document.getElementById('lightbox-prev');
    const nextBtn = document.getElementById('lightbox-next');

    let currentIndex = 0;

    photos.forEach((photo, index) => {
      const item = document.createElement('div');
      item.className = 'gallery-item';

      const img = document.createElement('img');
      img.src = photo.src;
      img.alt = photo.alt;
      img.loading = 'lazy';

      item.appendChild(img);
      item.onclick = () => openLightbox(index);

      gallery.appendChild(item);
    });

    function showPhoto(index) {
      currentIndex = (index + photos.length) % photos.length;
      const photo = photos[currentIndex];
      lightboxImg.src = photo.src;
      lightboxImg.alt = photo.alt;
      lightboxCaption.textContent = photo.caption || '';
    }

    function openLightbox(index) {
      showPhoto(index);
      lightbox.classList.add('open');
    }

    function closeLightbox() {
      lightbox.classList.remove('open');
      lightboxImg.src = '';
    }

    // Only clicking the backdrop closes the lightbox. The photo itself,
    // caption, and nav arrows are excluded so clicking them does nothing
    // (image/caption) or navigates (arrows) instead of closing.
    lightbox.addEventListener('click', closeLightbox);
    lightboxImg.addEventListener('click', (e) => e.stopPropagation());
    lightboxCaption.addEventListener('click', (e) => e.stopPropagation());
    prevBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      showPhoto(currentIndex - 1);
    });
    nextBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      showPhoto(currentIndex + 1);
    });

    document.addEventListener('keydown', (e) => {
      if (!lightbox.classList.contains('open')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') showPhoto(currentIndex - 1);
      if (e.key === 'ArrowRight') showPhoto(currentIndex + 1);
    });

    // SWIPE NAVIGATION (mobile)
    // Tracks horizontal finger movement. A swipe only counts if it moves
    // far enough sideways (40px) and isn't mostly vertical (which means
    // the person was likely just scrolling, not swiping a photo).
    let touchStartX = 0;
    let touchStartY = 0;

    lightbox.addEventListener('touchstart', (e) => {
      touchStartX = e.changedTouches[0].clientX;
      touchStartY = e.changedTouches[0].clientY;
    }, { passive: true });

    lightbox.addEventListener('touchend', (e) => {
      const touchEndX = e.changedTouches[0].clientX;
      const touchEndY = e.changedTouches[0].clientY;
      const deltaX = touchEndX - touchStartX;
      const deltaY = touchEndY - touchStartY;

      const minSwipeDistance = 40;
      const isMostlyHorizontal = Math.abs(deltaX) > Math.abs(deltaY);

      if (isMostlyHorizontal && Math.abs(deltaX) > minSwipeDistance) {
        e.preventDefault();
        if (deltaX < 0) {
          showPhoto(currentIndex + 1);
        } else {
          showPhoto(currentIndex - 1);
        }
      }
    }, { passive: false });

    // PAGE FADE TRANSITION (see index.html for full explanation)
    window.addEventListener('DOMContentLoaded', () => {
      document.body.classList.add('loaded');
    });

    window.addEventListener('pageshow', (e) => {
      if (e.persisted) {
        document.body.classList.add('loaded');
      }
    });

    document.querySelectorAll('a[href]').forEach(link => {
      const href = link.getAttribute('href');
      const isExternal = link.target === '_blank' || href.startsWith('http');
      const isAnchorOnly = href.startsWith('#');
      const isJsHandled = link.hasAttribute('onclick');

      if (isExternal || isAnchorOnly || isJsHandled) return;

      link.addEventListener('click', (e) => {
        e.preventDefault();
        document.body.classList.remove('loaded');
        setTimeout(() => {
          window.location.href = href;
        }, 350);
      });
    });
  </script>

</body>
</html>
